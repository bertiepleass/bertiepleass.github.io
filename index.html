<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bertie Pleass - Clifford Landing</title>

  <script src="https://cdn.plot.ly/plotly-latest.min.js" id="plotly-script"></script>

  <style>
    body {
      margin: 0;
      min-height: 180vh;
      overflow-x: hidden;
      overflow-y: auto;
      background: #ffffff;
    }

    #plot-shell {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 33.333vw;
      height: 66.666vh;
      transform: translate(-50%, -50%) scale(var(--plot-scale, 1));
      transform-origin: center center;
      transition: transform 140ms ease-out;
      will-change: transform;
      pointer-events: none;
      z-index: 0;
    }

    #attractor-plot {
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #attractor-plot * {
      pointer-events: none !important;
    }

    /* --- Landing page overlay UI --- */
    #site-ui {
      position: fixed;
      inset: 0;
      pointer-events: none; /* allow plot interaction by default */
      z-index: 10000;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #menuButton {
      pointer-events: auto;
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 3;
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .menu-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
    }

    .menu-panel {
      pointer-events: auto;
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 2;
      width: min(360px, calc(100vw - 28px));
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      transform: translateY(-8px);
      opacity: 0;
      transition: opacity 220ms ease, transform 220ms ease;
      display: none; /* hidden until opened */
      overflow: hidden;
    }

    .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 10px;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .menu-close {
      border: 0;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 6px 8px;
      border-radius: 10px;
    }

    .menu-close:hover {
      background: rgba(0, 0, 0, 0.06);
    }

    .menu-links {
      display: flex;
      flex-direction: column;
      padding: 6px 14px 14px;
      gap: 10px;
    }

    .menu-links a {
      color: #111;
      text-decoration: none;
      font-size: 14px;
      padding: 10px 10px;
      border-radius: 10px;
      transition: background 160ms ease;
    }

    .menu-links a:hover {
      background: rgba(0, 0, 0, 0.06);
    }

    .menu-divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.12);
      margin: 6px 0;
    }

    .menu-hint {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.65);
      padding: 0 14px 14px;
      line-height: 1.35;
    }

    .generation-controls {
      pointer-events: auto;
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 3;
      width: min(360px, calc(100vw - 28px));
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    .performance-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      letter-spacing: 0.7px;
      font-weight: 700;
      color: #4f4f4f;
      margin-bottom: 8px;
      text-shadow: 0 1px 0 #ececec;
    }

    .performance-row output {
      font-size: 12px;
      letter-spacing: 0;
      font-weight: 600;
      color: #5d5d5d;
    }

    .performance-meta {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #595959;
      letter-spacing: 0.2px;
      text-shadow: 0 1px 0 #ececec;
    }

    #pointsSlider {
      width: 100%;
      height: 12px;
      appearance: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #7f7f7f 0%, #696969 100%);
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.45), inset 0 -1px 0 rgba(255, 255, 255, 0.2);
      outline: none;
      margin: 2px 0 12px;
    }

    #pointsSlider::-webkit-slider-thumb {
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid #a9a9a9;
      background: linear-gradient(180deg, #f8f8f8 0%, #d9d9d9 100%);
      box-shadow: inset 0 1px 0 #ffffff, 0 1px 6px rgba(0, 0, 0, 0.35);
      cursor: pointer;
    }

    #pointsSlider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid #a9a9a9;
      background: linear-gradient(180deg, #f8f8f8 0%, #d9d9d9 100%);
      box-shadow: inset 0 1px 0 #ffffff, 0 1px 6px rgba(0, 0, 0, 0.35);
      cursor: pointer;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.7px;
      color: #4f4f4f;
    }

    .toggle-caption {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #4f4f4f;
      letter-spacing: 0.6px;
      font-weight: 700;
      text-shadow: 0 1px 0 #ececec;
    }

    .toggle-mode {
      font-size: 11px;
      color: #5d5d5d;
      font-weight: 600;
      letter-spacing: 0;
    }

    .switch {
      position: relative;
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch-track {
      position: relative;
      width: 48px;
      height: 28px;
      border-radius: 999px;
      background: linear-gradient(180deg, #c3c3c3 0%, #afafaf 100%);
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3), inset 0 -1px 0 rgba(255, 255, 255, 0.45);
      transition: background 180ms ease;
      display: inline-block;
    }

    .switch-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(180deg, #fdfdfd 0%, #d7d7d7 100%);
      border: 1px solid #aaaaaa;
      box-shadow: inset 0 1px 0 #ffffff, 0 2px 5px rgba(0, 0, 0, 0.3);
      transition: transform 180ms ease;
    }

    .switch input:checked + .switch-track {
      background: linear-gradient(180deg, #7c7c7c 0%, #696969 100%);
    }

    .switch input:checked + .switch-track .switch-thumb {
      transform: translateX(20px);
    }

    /* Open state */
    body.menu-open .menu-panel {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    body.menu-open .menu-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    /* Small screens: move button slightly inwards */
    @media (max-width: 480px) {
      #menuButton {
        top: 10px;
        right: 10px;
      }
      .menu-panel {
        top: 10px;
        right: 10px;
        width: calc(100vw - 20px);
      }
      .generation-controls {
        right: 10px;
        bottom: 10px;
        width: calc(100vw - 20px);
      }
      #plot-shell {
        width: min(92vw, 420px);
        height: 62vh;
      }
    }
  </style>
</head>

<body>
  <div id="plot-shell">
    <div id="attractor-plot"></div>
  </div>

  <!-- Overlay UI -->
  <div id="site-ui">
    <button id="menuButton" aria-expanded="false" aria-controls="menuPanel" title="Menu">
      &#9776;
    </button>

    <div id="menuPanel" class="menu-panel" role="menu" aria-hidden="true">
      <div class="menu-header">
        <div class="menu-title">Bertie Pleass</div>
        <button id="closeMenu" class="menu-close" aria-label="Close menu">&times;</button>
      </div>

      <nav class="menu-links">
        <a href="perlin.html">Perlin Waves</a>
        <a href="clifford.html">Clifford Attractor Generator</a>
        <a href="lyapunov.html">Lyapunov Exponent</a>

        <div class="menu-divider"></div>

        <a href="https://bertie-pleass.squarespace.com/" target="_blank" rel="noopener">Old lighting website -></a>
        <a href="https://cargocollective.com/bertiepleass" target="_blank" rel="noopener">Old objects website -></a>
      </nav>

      <div class="menu-hint">Tip: press <b>Esc</b> to close. Click outside to dismiss.</div>
    </div>

    <div id="menuBackdrop" class="menu-backdrop" aria-hidden="true"></div>

    <div id="generationControls" class="generation-controls">
      <div class="performance-row">
        <label for="pointsSlider">PERFORMANCE</label>
        <output id="pointsValue">300,000 pts</output>
      </div>
      <input id="pointsSlider" type="range" min="10000" max="1000000" step="10000" value="300000" />
      <div class="performance-meta" id="fpsValue">FPS: -- / target 5</div>
      <div class="toggle-row">
        <div class="toggle-caption">
          <span>GENERATION MODE</span>
          <span id="modeLabel" class="toggle-mode">STATIC</span>
        </div>
        <label class="switch">
          <input id="modeToggle" type="checkbox" aria-label="Toggle animation generation mode" />
          <span class="switch-track"><span class="switch-thumb"></span></span>
        </label>
      </div>
    </div>
  </div>

  <script>
    // Clifford Attractor Function
    function cliffordAttractor(a, b, c, d, x, y) {
      return {
        x: Math.sin(a * y) + c * Math.cos(a * x),
        y: Math.sin(b * x) + d * Math.cos(b * y),
      };
    }

    // Initial parameters for the attractor
    let initParams = { a: 1.5, b: -1.8, c: 1.6, d: 0.9 };
    let params = { ...initParams };

    // Generate slightly altered parameters
    function alterParameters(a, b, c, d) {
      const factor = () => 0.9 + Math.random();
      return { a: a * factor(), b: b * factor(), c: c * factor(), d: d * factor() };
    }

    // Controls (use scatter + fewer points when WebGL unavailable; pointcloud requires WebGL)
    function isWebGLAvailable() {
      try {
        var canvas = document.createElement("canvas");
        return !!(canvas.getContext("webgl") || canvas.getContext("experimental-webgl"));
      } catch (e) { return false; }
    }
    var webglAvailable = isWebGLAvailable();
    const defaultPoints = webglAvailable ? 300000 : 100000;
    let numberOfPoints = defaultPoints;
    const minPoints = 10000;
    const maxPoints = 1000000;
    let minBatchSize = 1000;
    let maxBatchSize = 5000;
    let timeoutInterval = 10;
    const animationFrameInterval = 33;
    const targetAnimationFps = 5;
    let generationMode = "static"; // "static" | "animation"
    const animatedParamKeys = ["a", "b", "c", "d"];
    let animatedParamIndex = Math.floor(Math.random() * animatedParamKeys.length);
    let animatedDirection = Math.random() < 0.5 ? 1 : -1;
    const animatedStep = 0.002;
    let runId = 0;
    let activeDrawId = 0;

    // Layout with disabled hover
    let layout = {
      xaxis: { showgrid: false, zeroline: false, showline: false, showticklabels: false, ticks: "" },
      yaxis: { showgrid: false, zeroline: false, showline: false, showticklabels: false, ticks: "" },
      margin: { l: 10, r: 10, b: 10, t: 10 },
      hovermode: false,
      autosize: true,
    };
    const plotConfig = { displayModeBar: false, staticPlot: true, scrollZoom: false };

    let isPaused = false;
    let animationTimeout;
    let currentIndex = 0;
    let data = { x: new Float32Array(numberOfPoints), y: new Float32Array(numberOfPoints) };
    let pointsSliderEl = null;
    let pointsValueEl = null;
    let modeLabelEl = null;
    let fpsValueEl = null;
    let lastAnimationFrameTimestamp = 0;
    let smoothedAnimationFps = 0;
    let lastAutoTuneTimestamp = 0;

    function formatPoints(value) {
      return Number(value).toLocaleString("en-US");
    }

    function updatePointsLabel() {
      if (!pointsValueEl) return;
      pointsValueEl.textContent = formatPoints(numberOfPoints) + " pts";
    }

    function updateModeLabel() {
      if (!modeLabelEl) return;
      modeLabelEl.textContent = generationMode === "animation" ? "ANIMATION" : "STATIC";
    }

    function updateFpsLabel() {
      if (!fpsValueEl) return;
      if (generationMode !== "animation" || !Number.isFinite(smoothedAnimationFps) || smoothedAnimationFps <= 0) {
        fpsValueEl.textContent = "FPS: -- / target " + targetAnimationFps;
        return;
      }
      fpsValueEl.textContent = "FPS: " + smoothedAnimationFps.toFixed(1) + " / target " + targetAnimationFps;
    }

    function resetAnimationMonitoring() {
      lastAnimationFrameTimestamp = 0;
      smoothedAnimationFps = 0;
      lastAutoTuneTimestamp = 0;
      updateFpsLabel();
    }

    function monitorAnimationAndAutoTune() {
      if (generationMode !== "animation") return;
      const now = performance.now();
      if (lastAnimationFrameTimestamp > 0) {
        const frameMs = Math.max(1, now - lastAnimationFrameTimestamp);
        const instantFps = 1000 / frameMs;
        smoothedAnimationFps = smoothedAnimationFps > 0
          ? smoothedAnimationFps * 0.75 + instantFps * 0.25
          : instantFps;
      }
      lastAnimationFrameTimestamp = now;
      updateFpsLabel();

      if (smoothedAnimationFps > 0 && smoothedAnimationFps < targetAnimationFps && numberOfPoints > minPoints) {
        if ((now - lastAutoTuneTimestamp) >= 900) {
          lastAutoTuneTimestamp = now;
          const scaledStep = Math.round((numberOfPoints * 0.08) / 10000) * 10000;
          const decrement = Math.max(10000, scaledStep);
          numberOfPoints = Math.max(minPoints, numberOfPoints - decrement);
          if (pointsSliderEl) pointsSliderEl.value = String(numberOfPoints);
          updatePointsLabel();
        }
      }
    }

    function pickAnimatedVariable() {
      animatedParamIndex = Math.floor(Math.random() * animatedParamKeys.length);
      const key = animatedParamKeys[animatedParamIndex];
      const minLimit = initParams[key] * 0.9;
      const maxLimit = initParams[key] * 1.1;
      if (params[key] <= minLimit) animatedDirection = 1;
      else if (params[key] >= maxLimit) animatedDirection = -1;
      else animatedDirection = Math.random() < 0.5 ? 1 : -1;
    }

    function stepAnimatedParameters() {
      const key = animatedParamKeys[animatedParamIndex];
      const minLimit = initParams[key] * 0.9;
      const maxLimit = initParams[key] * 1.1;
      params[key] += animatedStep * animatedDirection;
      if (params[key] > maxLimit || params[key] < minLimit) {
        params[key] = Math.max(minLimit, Math.min(maxLimit, params[key]));
        pickAnimatedVariable();
      }
    }

    function restartGeneration() {
      clearTimeout(animationTimeout);
      activeDrawId = -1;
      startAnimation(params);
    }

    function showPlotError(msg) {
      const plotContainer = document.getElementById("attractor-plot");
      if (!plotContainer) return;
      plotContainer.innerHTML = "<div style=\"display:flex;align-items:center;justify-content:center;height:100%;font-family:system-ui,sans-serif;color:#666;text-align:center;padding:20px;\">" + msg + "</div>";
    }

    // Start animation (uses a Worker to generate points)
    function startAnimation(params) {
      const thisRunId = ++runId;
      activeDrawId = -1;
      if (typeof Plotly === "undefined") {
        showPlotError("Chart library still loading... Refresh if this doesn't go away.");
        return;
      }
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (thisRunId !== runId) return;
          const plotContainer = document.getElementById("attractor-plot");
          if (!plotContainer) return;
          plotContainer.innerHTML = "";

          function initPlot() {
            if (thisRunId !== runId) return;
            try {
              var renderFullFrame = generationMode === "animation";
              var trace = webglAvailable
                ? {
                  x: renderFullFrame ? Array.from(data.x) : [],
                  y: renderFullFrame ? Array.from(data.y) : [],
                  type: "pointcloud",
                  marker: { size: 3, color: "black" }
                }
                : {
                  x: renderFullFrame ? Array.from(data.x) : [],
                  y: renderFullFrame ? Array.from(data.y) : [],
                  type: "scatter",
                  mode: "markers",
                  marker: { size: 2, color: "black" }
                };
              Promise.resolve(Plotly.newPlot("attractor-plot", [trace], layout, plotConfig)).then(() => {
                if (thisRunId !== runId) return;
                currentIndex = 0;
                if (renderFullFrame) {
                  monitorAnimationAndAutoTune();
                  animationTimeout = setTimeout(() => {
                    if (thisRunId !== runId) return;
                    stepAnimatedParameters();
                    startAnimation(params);
                  }, animationFrameInterval);
                } else {
                  activeDrawId = thisRunId;
                  animatePlot(thisRunId);
                }
              });
            } catch (err) {
              showPlotError("Something went wrong. Try refreshing the page.");
              console.error(err);
            }
          }

          if (window.Worker) {
            try {
              const workerCode = `
                self.onmessage = function(e) {
                  const { params, numberOfPoints } = e.data;
                  let x = 0, y = 0;
                  let out = { x: new Float32Array(numberOfPoints), y: new Float32Array(numberOfPoints) };
                  for (let i = 0; i < numberOfPoints; i++) {
                    const nx = Math.sin(params.a * y) + params.c * Math.cos(params.a * x);
                    const ny = Math.sin(params.b * x) + params.d * Math.cos(params.b * y);
                    out.x[i] = nx;
                    out.y[i] = ny;
                    x = nx; y = ny;
                  }
                  self.postMessage(out);
                }
              `;
              const worker = new Worker(URL.createObjectURL(new Blob([workerCode], { type: "application/javascript" })));
              worker.onerror = function () {
                worker.terminate();
                if (thisRunId !== runId) return;
                generatePoints(params);
                initPlot();
              };
              worker.onmessage = function (e) {
                worker.terminate();
                if (thisRunId !== runId) return;
                data = e.data;
                initPlot();
              };
              worker.postMessage({ params, numberOfPoints });
            } catch (err) {
              generatePoints(params);
              initPlot();
            }
          } else {
            generatePoints(params);
            initPlot();
          }
        });
      });
    }

    function generatePoints(params) {
      data = { x: new Float32Array(numberOfPoints), y: new Float32Array(numberOfPoints) };
      let x = 0, y = 0;
      for (let i = 0; i < numberOfPoints; i++) {
        const p = cliffordAttractor(params.a, params.b, params.c, params.d, x, y);
        data.x[i] = p.x;
        data.y[i] = p.y;
        x = p.x;
        y = p.y;
      }
    }

    function animatePlot(animationRunId) {
      if (animationRunId !== activeDrawId) return;
      if (isPaused) return;
      if (typeof Plotly === "undefined") return;

      var totalPoints = data.x.length;
      if (currentIndex < totalPoints) {
        const progressRatio = currentIndex / totalPoints;
        const batchSize = Math.floor(minBatchSize + progressRatio * (maxBatchSize - minBatchSize));
        const pointsToAdd = Math.min(batchSize, totalPoints - currentIndex);

        const update = {
          x: [Array.from(data.x.slice(currentIndex, currentIndex + pointsToAdd))],
          y: [Array.from(data.y.slice(currentIndex, currentIndex + pointsToAdd))],
        };

        try {
          Plotly.extendTraces("attractor-plot", update, [0]);
        } catch (e) {
          console.error(e);
          return;
        }
        currentIndex += pointsToAdd;

        animationTimeout = setTimeout(() => animatePlot(animationRunId), timeoutInterval);
      } else {
        params = alterParameters(initParams.a, initParams.b, initParams.c, initParams.d);
        startAnimation(params);
      }
    }

    function updatePlotScaleFromScroll() {
      const plotShell = document.getElementById("plot-shell");
      if (!plotShell) return;
      const maxScroll = Math.max(window.innerHeight, document.documentElement.scrollHeight - window.innerHeight);
      const progress = Math.min(1, Math.max(0, window.scrollY / maxScroll));
      const scale = 1 + progress * 2; // 1x to 3x
      plotShell.style.setProperty("--plot-scale", scale.toFixed(4));
    }

    let scrollTicking = false;
    window.addEventListener("scroll", () => {
      if (scrollTicking) return;
      scrollTicking = true;
      requestAnimationFrame(() => {
        updatePlotScaleFromScroll();
        scrollTicking = false;
      });
    }, { passive: true });

    // Resize plot on window resize
    window.addEventListener("resize", () => {
      if (typeof Plotly !== "undefined" && document.getElementById("attractor-plot")) {
        try { Plotly.Plots.resize("attractor-plot"); } catch (e) {}
      }
      updatePlotScaleFromScroll();
    });

    // Start only when Plotly is ready (avoids race where script runs before CDN finishes)
    function runWhenReady() {
      if (typeof Plotly !== "undefined") {
        startAnimation(params);
        return;
      }
      var elapsed = 0;
      var maxWait = 15000;
      var interval = setInterval(function () {
        elapsed += 200;
        if (typeof Plotly !== "undefined") {
          clearInterval(interval);
          startAnimation(params);
          return;
        }
        if (elapsed >= maxWait) {
          clearInterval(interval);
          showPlotError("Chart library didn't load. Check your connection and refresh.");
        }
      }, 200);
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", runWhenReady);
    } else {
      runWhenReady();
    }

    (function setupGenerationControls() {
      pointsSliderEl = document.getElementById("pointsSlider");
      pointsValueEl = document.getElementById("pointsValue");
      const modeToggle = document.getElementById("modeToggle");
      modeLabelEl = document.getElementById("modeLabel");
      fpsValueEl = document.getElementById("fpsValue");
      if (!pointsSliderEl || !pointsValueEl || !modeToggle || !modeLabelEl || !fpsValueEl) return;

      numberOfPoints = Number(pointsSliderEl.value) || defaultPoints;
      updatePointsLabel();
      updateModeLabel();
      updateFpsLabel();
      updatePlotScaleFromScroll();

      pointsSliderEl.addEventListener("input", () => {
        const nextPoints = Number(pointsSliderEl.value);
        if (!Number.isFinite(nextPoints)) return;
        numberOfPoints = Math.max(minPoints, Math.min(maxPoints, Math.floor(nextPoints)));
        updatePointsLabel();
      });

      pointsSliderEl.addEventListener("change", () => {
        restartGeneration();
      });

      modeToggle.addEventListener("change", () => {
        generationMode = modeToggle.checked ? "animation" : "static";
        resetAnimationMonitoring();
        if (generationMode === "animation") pickAnimatedVariable();
        updateModeLabel();
        restartGeneration();
      });
    })();

    // --- Menu overlay wiring ---
    (function setupMenuOverlay() {
      const menuButton = document.getElementById("menuButton");
      const menuPanel = document.getElementById("menuPanel");
      const menuBackdrop = document.getElementById("menuBackdrop");
      const closeMenuBtn = document.getElementById("closeMenu");
      if (!menuButton || !menuPanel || !menuBackdrop || !closeMenuBtn) return;

      function openMenu() {
        document.body.classList.add("menu-open");
        menuButton.setAttribute("aria-expanded", "true");
        menuPanel.setAttribute("aria-hidden", "false");
        menuBackdrop.setAttribute("aria-hidden", "false");
      }

      function closeMenu() {
        document.body.classList.remove("menu-open");
        menuButton.setAttribute("aria-expanded", "false");
        menuPanel.setAttribute("aria-hidden", "true");
        menuBackdrop.setAttribute("aria-hidden", "true");
      }

      menuButton.addEventListener("click", (e) => {
        e.stopPropagation();
        if (document.body.classList.contains("menu-open")) closeMenu();
        else openMenu();
      });

      closeMenuBtn.addEventListener("click", closeMenu);
      menuBackdrop.addEventListener("click", closeMenu);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeMenu();
      });
    })();
  </script>
</body>
</html>
