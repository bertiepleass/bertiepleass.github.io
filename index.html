  <script>
    // Clifford Attractor Function
    function cliffordAttractor(a, b, c, d, x, y) {
      return {
        x: Math.sin(a * y) + c * Math.cos(a * x),
        y: Math.sin(b * x) + d * Math.cos(b * y),
      };
    }

    // Initial parameters for the attractor
    let initParams = { a: 1.5, b: -1.8, c: 1.6, d: 0.9 };
    let params = { ...initParams };

    // Generate slightly altered parameters
    function alterParameters(a, b, c, d) {
      const factor = () => 0.9 + Math.random();
      return { a: a * factor(), b: b * factor(), c: c * factor(), d: d * factor() };
    }

    function randomizeParametersInRange(baseParams, minFactor, maxFactor) {
      const next = {};
      for (const key of Object.keys(baseParams)) {
        const baseValue = baseParams[key];
        const low = Math.min(baseValue * minFactor, baseValue * maxFactor);
        const high = Math.max(baseValue * minFactor, baseValue * maxFactor);
        next[key] = low + Math.random() * (high - low);
      }
      return next;
    }

    // Controls (use WebGL renderers when available)
    function isWebGLAvailable() {
      try {
        var canvas = document.createElement("canvas");
        return !!(canvas.getContext("webgl") || canvas.getContext("experimental-webgl"));
      } catch (e) { return false; }
    }
    var webglAvailable = isWebGLAvailable();
    const defaultPoints = webglAvailable ? 300000 : 100000;
    let numberOfPoints = defaultPoints;
    const minPoints = 10000;
    const maxPoints = 1000000;
    let minBatchSize = 1000;
    let maxBatchSize = 5000;
    let timeoutInterval = 10;
    const animationFrameInterval = 33;
    const targetAnimationFps = 10;
    const staticTargetBuildDurationMs = 5000;
    const staticMaxPointsPerImage = 1000000;
    let generationMode = "static"; // "static" | "animation"
    const animatedParamKeys = ["a", "b", "c", "d"];
    let animatedParamIndex = Math.floor(Math.random() * animatedParamKeys.length);
    let animatedDirection = Math.random() < 0.5 ? 1 : -1;
    const animatedStep = 0.0008;
    let runId = 0;
    let activeDrawId = 0;
    const trailFrameCount = 4;
    const trailOpacities = [0.12, 0.24, 0.45, 0.8];
    const scatterGlMarkerSize = 0.7;
    const pointCloudMarkerSize = 3;
    const autoTuneIntervalMs = 350;
    const cullStartScale = 1.35;
    const cullOverscanFactor = 1.45;
    let animationFrameTrail = [];

    // Layout with disabled hover
    let layout = {
      xaxis: { showgrid: false, zeroline: false, showline: false, showticklabels: false, ticks: "" },
      yaxis: { showgrid: false, zeroline: false, showline: false, showticklabels: false, ticks: "" },
      margin: { l: 10, r: 10, b: 10, t: 10 },
      hovermode: false,
      showlegend: false,
      autosize: true,
    };
    const plotConfig = { displayModeBar: false, scrollZoom: false };

    let isPaused = false;
    let animationTimeout;
    let currentIndex = 0;
    let data = { x: new Float32Array(numberOfPoints), y: new Float32Array(numberOfPoints) };
    let renderData = data;
    let pointsSliderEl = null;
    let pointsValueEl = null;
    let modeLabelEl = null;
    let fpsValueEl = null;
    let lastAnimationFrameTimestamp = 0;
    let smoothedAnimationFps = 0;
    let lastAutoTuneTimestamp = 0;
    let staticBuildStartedAt = 0;
    let lastStaticBuildDurationMs = 0;
    let staticPreferredPoints = numberOfPoints;
    let pointWorker = null;
    let pointWorkerURL = null;
    let pointWorkerJobId = 0;
    let currentPlotScale = 1;
    let currentDataBounds = null;
    let lastScaleSyncAt = 0;
    let lastScaleSyncedValue = 1;
    const pendingWorkerJobs = new Map();

    function formatPoints(value) {
      return Number(value).toLocaleString("en-US");
    }

    function ensurePointWorker() {
      if (!window.Worker) return null;
      if (pointWorker) return pointWorker;

      const workerCode = `
        self.onmessage = function(e) {
          const { jobId, params, numberOfPoints } = e.data;
          let x = 0, y = 0;
          const outX = new Float32Array(numberOfPoints);
          const outY = new Float32Array(numberOfPoints);
          let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
          for (let i = 0; i < numberOfPoints; i++) {
            const nx = Math.sin(params.a * y) + params.c * Math.cos(params.a * x);
            const ny = Math.sin(params.b * x) + params.d * Math.cos(params.b * y);
            outX[i] = nx;
            outY[i] = ny;
            if (nx < minX) minX = nx;
            if (nx > maxX) maxX = nx;
            if (ny < minY) minY = ny;
            if (ny > maxY) maxY = ny;
            x = nx; y = ny;
          }
          self.postMessage({ jobId, x: outX, y: outY, minX, maxX, minY, maxY }, [outX.buffer, outY.buffer]);
        };
      `;

      pointWorkerURL = URL.createObjectURL(new Blob([workerCode], { type: "application/javascript" }));
      pointWorker = new Worker(pointWorkerURL);

      pointWorker.onmessage = function (e) {
        const msg = e.data || {};
        const job = pendingWorkerJobs.get(msg.jobId);
        if (!job) return;
        pendingWorkerJobs.delete(msg.jobId);
        job.resolve({
          x: msg.x,
          y: msg.y,
          bounds: {
            minX: msg.minX,
            maxX: msg.maxX,
            minY: msg.minY,
            maxY: msg.maxY,
          }
        });
      };

      pointWorker.onerror = function (err) {
        for (const [, job] of pendingWorkerJobs) job.reject(err);
        pendingWorkerJobs.clear();
      };

      return pointWorker;
    }

    function requestPointsFromWorker(params, pointCount) {
      return new Promise((resolve, reject) => {
        const worker = ensurePointWorker();
        if (!worker) {
          reject(new Error("Worker unavailable"));
          return;
        }
        const jobId = ++pointWorkerJobId;
        pendingWorkerJobs.set(jobId, { resolve, reject });
        worker.postMessage({ jobId, params, numberOfPoints: pointCount });
      });
    }

    function buildTrailTraces() {
      const traces = [];
      const webglPointSize = getScaledPointSize(pointCloudMarkerSize, 0.45);
      const cpuPointSize = getScaledPointSize(2, 0.45);
      for (let i = 0; i < animationFrameTrail.length; i++) {
        const frame = animationFrameTrail[i];
        const opacity = trailOpacities[Math.max(0, trailOpacities.length - animationFrameTrail.length + i)] || 0.8;
        traces.push(webglAvailable
          ? { x: frame.x, y: frame.y, type: "pointcloud", showlegend: false, marker: { size: webglPointSize, color: "black" }, opacity: opacity }
          : { x: frame.x, y: frame.y, type: "scatter", mode: "markers", showlegend: false, marker: { size: cpuPointSize, color: "black" }, opacity: opacity });
      }
      return traces;
    }

    function getScaledPointSize(baseSize, minSize) {
      const floor = Number.isFinite(minSize) ? minSize : 0.4;
      return Math.max(floor, baseSize / Math.max(1, currentPlotScale));
    }

    function computeDataBounds(xArr, yArr) {
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      const len = Math.min(xArr.length, yArr.length);
      for (let i = 0; i < len; i++) {
        const x = xArr[i];
        const y = yArr[i];
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
      if (!Number.isFinite(minX) || !Number.isFinite(maxX) || !Number.isFinite(minY) || !Number.isFinite(maxY)) {
        return null;
      }
      return { minX, maxX, minY, maxY };
    }

    function cullPointsToVisibleWindow(xArr, yArr, bounds) {
      if (!bounds || currentPlotScale < cullStartScale) return { x: xArr, y: yArr };
      const fullWidth = Math.max(1e-9, bounds.maxX - bounds.minX);
      const fullHeight = Math.max(1e-9, bounds.maxY - bounds.minY);
      const centerX = (bounds.minX + bounds.maxX) * 0.5;
      const centerY = (bounds.minY + bounds.maxY) * 0.5;
      const halfVisibleWidth = Math.min(fullWidth * 0.5, (fullWidth / (2 * currentPlotScale)) * cullOverscanFactor);
      const halfVisibleHeight = Math.min(fullHeight * 0.5, (fullHeight / (2 * currentPlotScale)) * cullOverscanFactor);
      const minX = centerX - halfVisibleWidth;
      const maxX = centerX + halfVisibleWidth;
      const minY = centerY - halfVisibleHeight;
      const maxY = centerY + halfVisibleHeight;
      const padX = (maxX - minX) * 0.12;
      const padY = (maxY - minY) * 0.12;
      const clippedMinX = minX - padX;
      const clippedMaxX = maxX + padX;
      const clippedMinY = minY - padY;
      const clippedMaxY = maxY + padY;

      const len = Math.min(xArr.length, yArr.length);
      let kept = 0;
      for (let i = 0; i < len; i++) {
        const x = xArr[i];
        const y = yArr[i];
        if (x >= clippedMinX && x <= clippedMaxX && y >= clippedMinY && y <= clippedMaxY) kept++;
      }

      if (kept === 0 || kept === len) return { x: xArr, y: yArr };

      const outX = new Float32Array(kept);
      const outY = new Float32Array(kept);
      let cursor = 0;
      for (let i = 0; i < len; i++) {
        const x = xArr[i];
        const y = yArr[i];
        if (x >= clippedMinX && x <= clippedMaxX && y >= clippedMinY && y <= clippedMaxY) {
          outX[cursor] = x;
          outY[cursor] = y;
          cursor++;
        }
      }
      return { x: outX, y: outY };
    }

    function syncPlotToScale() {
      if (typeof Plotly === "undefined") return;
      const plotContainer = document.getElementById("attractor-plot");
      if (!plotContainer || !plotContainer.data || !plotContainer.data.length) return;

      const now = performance.now();
      if ((now - lastScaleSyncAt) < 90) return;
      if (Math.abs(currentPlotScale - lastScaleSyncedValue) < 0.02) return;
      lastScaleSyncAt = now;
      lastScaleSyncedValue = currentPlotScale;

      if (generationMode === "static" && data && data.x && data.y && data.x.length > 0 && currentDataBounds) {
        const previousVisibleLength = Math.max(1, renderData && renderData.x ? renderData.x.length : data.x.length);
        const progress = Math.max(0, Math.min(1, currentIndex / previousVisibleLength));
        renderData = cullPointsToVisibleWindow(data.x, data.y, currentDataBounds);
        currentIndex = Math.max(0, Math.min(renderData.x.length, Math.round(progress * renderData.x.length)));
        const visibleCount = currentIndex;
        const staticTrace = webglAvailable
          ? {
              x: Array.from(renderData.x.slice(0, visibleCount)),
              y: Array.from(renderData.y.slice(0, visibleCount)),
              type: "pointcloud",
              showlegend: false,
              marker: { size: getScaledPointSize(pointCloudMarkerSize, 0.45), color: "black" }
            }
          : {
              x: Array.from(renderData.x.slice(0, visibleCount)),
              y: Array.from(renderData.y.slice(0, visibleCount)),
              type: "scatter",
              mode: "markers",
              showlegend: false,
              marker: { size: getScaledPointSize(2, 0.45), color: "black" }
            };
        Promise.resolve(Plotly.react("attractor-plot", [staticTrace], layout, plotConfig)).catch(() => {});
        return;
      }

      const webglPointSize = getScaledPointSize(pointCloudMarkerSize, 0.45);
      const cpuPointSize = getScaledPointSize(2, 0.45);
      const pointSizes = plotContainer.data.map((trace) => (trace && trace.type === "scatter" ? cpuPointSize : webglPointSize));
      try {
        Plotly.restyle("attractor-plot", { "marker.size": pointSizes });
      } catch (e) {}
    }

    function updatePointsLabel() {
      if (!pointsValueEl) return;
      pointsValueEl.textContent = formatPoints(numberOfPoints) + " pts";
    }

    function updateModeLabel() {
      if (!modeLabelEl) return;
      modeLabelEl.textContent = generationMode === "animation" ? "ANIMATION" : "STATIC";
    }

    function updateFpsLabel() {
      if (!fpsValueEl) return;
      if (generationMode === "static") {
        if (!Number.isFinite(lastStaticBuildDurationMs) || lastStaticBuildDurationMs <= 0) {
          fpsValueEl.textContent = "BUILD: -- / target " + (staticTargetBuildDurationMs / 1000).toFixed(2) + "s";
          return;
        }
        fpsValueEl.textContent = "BUILD: " + (lastStaticBuildDurationMs / 1000).toFixed(2) + "s / target " + (staticTargetBuildDurationMs / 1000).toFixed(2) + "s";
        return;
      }
      if (!Number.isFinite(smoothedAnimationFps) || smoothedAnimationFps <= 0) {
        fpsValueEl.textContent = "FPS: -- / target " + targetAnimationFps;
        return;
      }
      fpsValueEl.textContent = "FPS: " + smoothedAnimationFps.toFixed(1) + " / target " + targetAnimationFps;
    }

    function tuneStaticPoints(buildDurationMs) {
      if (generationMode !== "static") return;
      if (!Number.isFinite(buildDurationMs) || buildDurationMs <= 0) return;

      const target = staticTargetBuildDurationMs;
      const lowerBound = target * 0.92;
      const upperBound = target * 1.08;
      const currentPoints = numberOfPoints;
      let nextPoints = currentPoints;

      if (buildDurationMs < lowerBound) {
        // Scale up quickly when well under target, while avoiding abrupt oscillation.
        const scaleUp = Math.min(2.2, Math.max(1.08, target / buildDurationMs));
        nextPoints = Math.round((currentPoints * scaleUp) / 10000) * 10000;
      } else if (buildDurationMs > upperBound) {
        const scaleDown = Math.max(0.45, Math.min(0.98, target / buildDurationMs));
        nextPoints = Math.round((currentPoints * scaleDown) / 10000) * 10000;
      }

      nextPoints = Math.max(minPoints, Math.min(staticMaxPointsPerImage, nextPoints));
      if (nextPoints !== currentPoints) {
        numberOfPoints = nextPoints;
        staticPreferredPoints = nextPoints;
        if (pointsSliderEl) pointsSliderEl.value = String(nextPoints);
        updatePointsLabel();
      }
    }

    function resetFrameMonitoring() {
      lastAnimationFrameTimestamp = 0;
      smoothedAnimationFps = 0;
      lastAutoTuneTimestamp = 0;
      updateFpsLabel();
    }

    function monitorFrameRateAndAutoTune() {
      const now = performance.now();
      if (lastAnimationFrameTimestamp > 0) {
        const frameMs = Math.max(1, now - lastAnimationFrameTimestamp);
        const instantFps = 1000 / frameMs;
        smoothedAnimationFps = smoothedAnimationFps > 0
          ? smoothedAnimationFps * 0.75 + instantFps * 0.25
          : instantFps;
      }
      lastAnimationFrameTimestamp = now;
      updateFpsLabel();

      if (generationMode !== "animation" || smoothedAnimationFps <= 0) return;
      if ((now - lastAutoTuneTimestamp) < autoTuneIntervalMs) return;
      lastAutoTuneTimestamp = now;

      const lowerFpsBound = targetAnimationFps * 0.95;
      const upperFpsBound = targetAnimationFps * 1.08;

      if (smoothedAnimationFps < lowerFpsBound && numberOfPoints > minPoints) {
        const severeDrop = smoothedAnimationFps < (targetAnimationFps * 0.6);
        const ratio = severeDrop ? 0.3 : 0.16;
        const scaledStep = Math.round((numberOfPoints * ratio) / 10000) * 10000;
        const decrement = Math.max(severeDrop ? 20000 : 10000, scaledStep);
        numberOfPoints = Math.max(minPoints, numberOfPoints - decrement);
        if (pointsSliderEl) pointsSliderEl.value = String(numberOfPoints);
        updatePointsLabel();
        return;
      }

      if (smoothedAnimationFps > upperFpsBound && numberOfPoints < maxPoints) {
        const strongHeadroom = smoothedAnimationFps > (targetAnimationFps * 1.4);
        const ratio = strongHeadroom ? 0.12 : 0.07;
        const scaledStep = Math.round((numberOfPoints * ratio) / 10000) * 10000;
        const increment = Math.max(10000, scaledStep);
        numberOfPoints = Math.min(maxPoints, numberOfPoints + increment);
        if (pointsSliderEl) pointsSliderEl.value = String(numberOfPoints);
        updatePointsLabel();
      }
    }

    function pickAnimatedVariable() {
      animatedParamIndex = Math.floor(Math.random() * animatedParamKeys.length);
      const key = animatedParamKeys[animatedParamIndex];
      const minLimit = initParams[key] * 0.9;
      const maxLimit = initParams[key] * 1.1;
      if (params[key] <= minLimit) animatedDirection = 1;
      else if (params[key] >= maxLimit) animatedDirection = -1;
      else animatedDirection = Math.random() < 0.5 ? 1 : -1;
    }

    function stepAnimatedParameters() {
      const key = animatedParamKeys[animatedParamIndex];
      const minLimit = initParams[key] * 0.9;
      const maxLimit = initParams[key] * 1.1;
      params[key] += animatedStep * animatedDirection;
      if (params[key] > maxLimit || params[key] < minLimit) {
        params[key] = Math.max(minLimit, Math.min(maxLimit, params[key]));
        pickAnimatedVariable();
      }
    }

    function restartGeneration() {
      clearTimeout(animationTimeout);
      activeDrawId = -1;
      animationFrameTrail = [];
      staticBuildStartedAt = 0;
      lastStaticBuildDurationMs = 0;
      updateFpsLabel();
      startAnimation(params);
    }

    function showPlotError(msg) {
      const plotContainer = document.getElementById("attractor-plot");
      if (!plotContainer) return;
      plotContainer.innerHTML = "<div style=\"display:flex;align-items:center;justify-content:center;height:100%;font-family:system-ui,sans-serif;color:#666;text-align:center;padding:20px;\">" + msg + "</div>";
    }

    // Start animation (uses a Worker to generate points)
    function startAnimation(params) {
      const thisRunId = ++runId;
      activeDrawId = -1;
      if (typeof Plotly === "undefined") {
        showPlotError("Chart library still loading... Refresh if this doesn't go away.");
        return;
      }
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (thisRunId !== runId) return;
          const plotContainer = document.getElementById("attractor-plot");
          if (!plotContainer) return;
          const renderFullFrame = generationMode === "animation";
          if (!renderFullFrame) plotContainer.innerHTML = "";

          function initPlot() {
            if (thisRunId !== runId) return;
            try {
              if (renderFullFrame) {
                // Keep typed-array references from each generated frame; avoid expensive JS array copies.
                animationFrameTrail.push({ x: renderData.x, y: renderData.y });
                if (animationFrameTrail.length > trailFrameCount) animationFrameTrail.shift();

                const trailTraces = buildTrailTraces();
                const renderPromise = plotContainer.data
                  ? Plotly.react("attractor-plot", trailTraces, layout, plotConfig)
                  : Plotly.newPlot("attractor-plot", trailTraces, layout, plotConfig);

                Promise.resolve(renderPromise).then(() => {
                  if (thisRunId !== runId) return;
                  monitorFrameRateAndAutoTune();
                  animationTimeout = setTimeout(() => {
                    if (thisRunId !== runId) return;
                    stepAnimatedParameters();
                    startAnimation(params);
                  }, animationFrameInterval);
                });
                return;
              }

              var trace = webglAvailable
                ? { x: [], y: [], type: "pointcloud", showlegend: false, marker: { size: getScaledPointSize(pointCloudMarkerSize, 0.45), color: "black" } }
                : { x: [], y: [], type: "scatter", mode: "markers", showlegend: false, marker: { size: getScaledPointSize(2, 0.45), color: "black" } };
              Promise.resolve(Plotly.newPlot("attractor-plot", [trace], layout, plotConfig)).then(() => {
                if (thisRunId !== runId) return;
                currentIndex = 0;
                staticBuildStartedAt = performance.now();
                activeDrawId = thisRunId;
                animatePlot(thisRunId);
              });
            } catch (err) {
              showPlotError("Something went wrong. Try refreshing the page.");
              console.error(err);
            }
          }

          requestPointsFromWorker(params, numberOfPoints)
            .then((out) => {
              if (thisRunId !== runId) return;
              data = { x: out.x, y: out.y };
              currentDataBounds = out.bounds || computeDataBounds(data.x, data.y);
              renderData = cullPointsToVisibleWindow(data.x, data.y, currentDataBounds);
              initPlot();
            })
            .catch(() => {
              if (thisRunId !== runId) return;
              generatePoints(params);
              renderData = cullPointsToVisibleWindow(data.x, data.y, currentDataBounds);
              initPlot();
            });
        });
      });
    }

    function generatePoints(params) {
      data = { x: new Float32Array(numberOfPoints), y: new Float32Array(numberOfPoints) };
      let x = 0, y = 0;
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (let i = 0; i < numberOfPoints; i++) {
        const p = cliffordAttractor(params.a, params.b, params.c, params.d, x, y);
        data.x[i] = p.x;
        data.y[i] = p.y;
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
        x = p.x;
        y = p.y;
      }
      currentDataBounds = { minX, maxX, minY, maxY };
    }

    function animatePlot(animationRunId) {
      if (animationRunId !== activeDrawId) return;
      if (isPaused) return;
      if (typeof Plotly === "undefined") return;

      const totalPoints = Math.min(staticMaxPointsPerImage, renderData.x.length);
      if (currentIndex < totalPoints) {
        const progressRatio = currentIndex / Math.max(1, totalPoints);
        const baseBatchSize = Math.floor(minBatchSize + progressRatio * (maxBatchSize - minBatchSize));
        const pointsRemaining = totalPoints - currentIndex;
        const pointsToAdd = Math.min(pointsRemaining, baseBatchSize);

        const update = {
          x: [Array.from(renderData.x.slice(currentIndex, currentIndex + pointsToAdd))],
          y: [Array.from(renderData.y.slice(currentIndex, currentIndex + pointsToAdd))],
        };

        try {
          Plotly.extendTraces("attractor-plot", update, [0]);
        } catch (e) {
          console.error(e);
          return;
        }
        currentIndex += pointsToAdd;
        monitorFrameRateAndAutoTune();

        animationTimeout = setTimeout(() => animatePlot(animationRunId), timeoutInterval);
      } else {
        lastStaticBuildDurationMs = staticBuildStartedAt > 0 ? (performance.now() - staticBuildStartedAt) : 0;
        tuneStaticPoints(lastStaticBuildDurationMs);
        updateFpsLabel();
        params = alterParameters(initParams.a, initParams.b, initParams.c, initParams.d);
        startAnimation(params);
      }
    }

    function updatePlotScaleFromScroll() {
      const plotShell = document.getElementById("plot-shell");
      if (!plotShell) return;
      const maxScroll = Math.max(window.innerHeight, document.documentElement.scrollHeight - window.innerHeight);
      const progress = Math.min(1, Math.max(0, window.scrollY / maxScroll));
      const scale = 1 + progress * 2; // 1x to 3x
      currentPlotScale = scale;
      plotShell.style.setProperty("--plot-scale", scale.toFixed(4));
      syncPlotToScale();
    }

    let scrollTicking = false;
    window.addEventListener("scroll", () => {
      if (scrollTicking) return;
      scrollTicking = true;
      requestAnimationFrame(() => {
        updatePlotScaleFromScroll();
        scrollTicking = false;
      });
    }, { passive: true });

    // Resize plot on window resize
    window.addEventListener("resize", () => {
      if (typeof Plotly !== "undefined" && document.getElementById("attractor-plot")) {
        try { Plotly.Plots.resize("attractor-plot"); } catch (e) {}
      }
      updatePlotScaleFromScroll();
    });

    window.addEventListener("beforeunload", () => {
      if (pointWorker) {
        pointWorker.terminate();
        pointWorker = null;
      }
      if (pointWorkerURL) {
        URL.revokeObjectURL(pointWorkerURL);
        pointWorkerURL = null;
      }
      pendingWorkerJobs.clear();
    });

    // Start only when Plotly is ready (avoids race where script runs before CDN finishes)
    function runWhenReady() {
      if (typeof Plotly !== "undefined") {
        startAnimation(params);
        return;
      }
      var elapsed = 0;
      var maxWait = 15000;
      var interval = setInterval(function () {
        elapsed += 200;
        if (typeof Plotly !== "undefined") {
          clearInterval(interval);
          startAnimation(params);
          return;
        }
        if (elapsed >= maxWait) {
          clearInterval(interval);
          showPlotError("Chart library didn't load. Check your connection and refresh.");
        }
      }, 200);
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", runWhenReady);
    } else {
      runWhenReady();
    }

    (function setupGenerationControls() {
      const newPatternButton = document.getElementById("newPatternButton");
      pointsSliderEl = document.getElementById("pointsSlider");
      pointsValueEl = document.getElementById("pointsValue");
      const modeToggle = document.getElementById("modeToggle");
      modeLabelEl = document.getElementById("modeLabel");
      fpsValueEl = document.getElementById("fpsValue");
      if (!newPatternButton || !pointsSliderEl || !pointsValueEl || !modeToggle || !modeLabelEl || !fpsValueEl) return;

      numberOfPoints = Number(pointsSliderEl.value) || defaultPoints;
      updatePointsLabel();
      updateModeLabel();
      updateFpsLabel();
      updatePlotScaleFromScroll();

      function triggerNewPattern() {
        params = generationMode === "animation"
          ? randomizeParametersInRange(initParams, 0.9, 1.1)
          : randomizeParametersInRange(initParams, 0.9, 1.9);
        if (generationMode === "animation") pickAnimatedVariable();
        restartGeneration();
      }

      newPatternButton.addEventListener("click", () => {
        triggerNewPattern();
      });

      document.addEventListener("keydown", (e) => {
        if (e.defaultPrevented || e.repeat) return;
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        if (!e.key || e.key.toLowerCase() !== "n") return;
        triggerNewPattern();
      });

      pointsSliderEl.addEventListener("input", () => {
        const nextPoints = Number(pointsSliderEl.value);
        if (!Number.isFinite(nextPoints)) return;
        numberOfPoints = Math.max(minPoints, Math.min(maxPoints, Math.floor(nextPoints)));
        if (generationMode === "static") staticPreferredPoints = numberOfPoints;
        updatePointsLabel();
      });

      pointsSliderEl.addEventListener("change", () => {
        restartGeneration();
      });

      modeToggle.addEventListener("change", () => {
        const switchingToAnimation = modeToggle.checked;
        generationMode = switchingToAnimation ? "animation" : "static";
        resetFrameMonitoring();
        animationFrameTrail = [];
        if (generationMode === "animation") {
          staticPreferredPoints = Math.max(minPoints, Math.min(staticMaxPointsPerImage, numberOfPoints));
          if (numberOfPoints > 180000) {
            numberOfPoints = 180000;
            if (pointsSliderEl) pointsSliderEl.value = String(numberOfPoints);
            updatePointsLabel();
          }
          pickAnimatedVariable();
        } else {
          numberOfPoints = Math.max(minPoints, Math.min(staticMaxPointsPerImage, staticPreferredPoints));
          if (pointsSliderEl) pointsSliderEl.value = String(numberOfPoints);
          updatePointsLabel();
        }
        updateModeLabel();
        restartGeneration();
      });
    })();

    // --- Menu overlay wiring ---
    (function setupMenuOverlay() {
      const menuButton = document.getElementById("menuButton");
      const menuPanel = document.getElementById("menuPanel");
      const menuBackdrop = document.getElementById("menuBackdrop");
      const closeMenuBtn = document.getElementById("closeMenu");
      if (!menuButton || !menuPanel || !menuBackdrop || !closeMenuBtn) return;

      function openMenu() {
        document.body.classList.add("menu-open");
        menuButton.setAttribute("aria-expanded", "true");
        menuPanel.setAttribute("aria-hidden", "false");
        menuBackdrop.setAttribute("aria-hidden", "false");
      }

      function closeMenu() {
        document.body.classList.remove("menu-open");
        menuButton.setAttribute("aria-expanded", "false");
        menuPanel.setAttribute("aria-hidden", "true");
        menuBackdrop.setAttribute("aria-hidden", "true");
      }

      menuButton.addEventListener("click", (e) => {
        e.stopPropagation();
        if (document.body.classList.contains("menu-open")) closeMenu();
        else openMenu();
      });

      closeMenuBtn.addEventListener("click", closeMenu);
      menuBackdrop.addEventListener("click", closeMenu);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeMenu();
      });
    })();
  </script>
</body>
</html>
