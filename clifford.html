<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Clifford Strange Attractor Animation</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #controls-container {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 300px;
            background-color: #f1f1f1;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            display: none; /* Hide by default */
        }

        #icon {
            cursor: pointer;
            font-size: 24px;
            padding: 10px;
            position: fixed;
            top: 10px;
            right: 10px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }

        .slider-container label {
            margin-right: 10px;
            font-size: 14px;
            width: 150px;
        }

        .slider-container input {
            flex: 1;
        }

        .slider-value {
            margin-left: 10px;
            width: 50px;
            text-align: right;
        }

        button {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="attractor-plot" style="width: 100%; height: 100%;"></div> <!-- 80vh;"></div> -->

    <div id="icon">☰</div> <!-- Hamburger menu icon for settings -->
    <div id="controls-container">
        <button id="playPauseButton">Pause</button> <!-- Combined Play/Pause button -->
        <button id="nextButton">Next Animation</button>

        <!-- Slider for Timeout Interval -->
        <div class="slider-container">
            <label for="timeoutIntervalSlider">Timeout Interval (ms):</label>
            <input type="range" id="timeoutIntervalSlider" min="0" max="500" value="10" step="10">
            <span class="slider-value" id="timeoutIntervalValue">100</span>
        </div>

        <!-- Slider for Min Batch Size -->
        <div class="slider-container">
            <label for="minBatchSizeSlider">Min Batch Size:</label>
            <input type="range" id="minBatchSizeSlider" min="100" max="10000" value="1000" step="100">
            <span class="slider-value" id="minBatchSizeValue">1000</span>
        </div>

        <!-- Slider for Max Batch Size -->
        <div class="slider-container">
            <label for="maxBatchSizeSlider">Max Batch Size:</label>
            <input type="range" id="maxBatchSizeSlider" min="100" max="10000" value="5000" step="100">
            <span class="slider-value" id="maxBatchSizeValue">5000</span>
        </div>

        <!-- Slider for Number of Points -->
        <div class="slider-container">
            <label for="numberOfPointsSlider">Number of Points:</label>
            <input type="range" id="numberOfPointsSlider" min="1000" max="5000000" value="1000000" step="1000">
            <span class="slider-value" id="numberOfPointsValue">1000000</span>
        </div>

        <!-- Slider for Plot Width -->
        <div class="slider-container">
            <label for="plotWidthSlider">Plot Width (px):</label>
            <input type="range" id="plotWidthSlider" min="500" max="3000" value="1000" step="100">
            <span class="slider-value" id="plotWidthValue">1000</span>
        </div>

        <!-- Slider for Plot Height -->
        <div class="slider-container">
            <label for="plotHeightSlider">Plot Height (px):</label>
            <input type="range" id="plotHeightSlider" min="400" max="2000" value="800" step="100">
            <span class="slider-value" id="plotHeightValue">800</span>
        </div>
    </div>
    <script>
        // Clifford Attractor Function
        function cliffordAttractor(a, b, c, d, x, y) {
            return {
                x: Math.sin(a * y) + c * Math.cos(a * x),
                y: Math.sin(b * x) + d * Math.cos(b * y)
            };
        }

        // Initial parameters for the attractor
        let initParams = { a: 1.5, b: -1.8, c: 1.6, d: 0.9 };
        let params = { a: 1.5, b: -1.8, c: 1.6, d: 0.9 };

        // Function to generate slightly altered parameters
        function alterParameters(a, b, c, d) {
            const factor = () => 0.9 + Math.random();
            return {
                a: a * factor(),
                b: b * factor(),
                c: c * factor(),
                d: d * factor()
            };
        }

        let numberOfPoints = 2000000;
        let batchSize = 5000; // Update this value to control batch size
        let minBatchSize = 1000;
        let maxBatchSize = 5000;
        let timeoutInterval = 10; // Default timeout interval        

        // Define layout with disabled hover
        let layout = {
            xaxis: {
                showgrid: false,
                zeroline: false,
                showline: false,
                showticklabels: false,
                ticks: ''
            },
            yaxis: {
                showgrid: false,
                zeroline: false,
                showline: false,
                showticklabels: false,
                ticks: ''
            },
            margin: {
                l: 10,
                r: 10,
                b: 10,
                t: 10
            },
            hovermode: false,
            autosize: true
        };

        let isPaused = false;
        let animationTimeout;
        let data = { x: new Float32Array(numberOfPoints), y: new Float32Array(numberOfPoints) };

        // Function to start the animation
        function startAnimation(params) {
            flashScreen(() => {
        // Use requestAnimationFrame to ensure that the flash has been rendered
        requestAnimationFrame(() => {
            // Now that the first frame is done, request another frame to be 100% sure the browser has rendered it
            requestAnimationFrame(() => {
                // Now we can safely proceed with heavy tasks, after ensuring the flash was visible

                const plotContainer = document.getElementById('attractor-plot');
                plotContainer.innerHTML = ''; // Clear any existing plot

            // Use web worker for generating points
            if (window.Worker) {
                let worker = new Worker(URL.createObjectURL(new Blob([`
                    self.onmessage = function(e) {
                        const { params, numberOfPoints } = e.data;
                        let x = 0, y = 0;
                        let data = { x: new Float32Array(numberOfPoints), y: new Float32Array(numberOfPoints) };
                        for (let i = 0; i < numberOfPoints; i++) {
                            let point = {
                                x: Math.sin(params.a * y) + params.c * Math.cos(params.a * x),
                                y: Math.sin(params.b * x) + params.d * Math.cos(params.b * y)
                            };
                            data.x[i] = point.x;
                            data.y[i] = point.y;
                            x = point.x;
                            y = point.y;
                        }
                        self.postMessage(data);
                    }
                `], { type: 'application/javascript' })));

                worker.postMessage({ params, numberOfPoints });

                worker.onmessage = function(e) {
                    data = e.data;
                    Plotly.newPlot('attractor-plot', [{ x: [], y: [], type: 'pointcloud', marker: { size: 3,color: 'black' } }], layout);
                    currentIndex = 0;
                    animatePlot();
                    worker.terminate(); // Terminate worker to prevent memory leak
                };
            } else {
                generatePoints(params);
                Plotly.newPlot('attractor-plot', [{ x: [], y: [], type: 'pointcloud', marker: { size: 3,color: 'black' } }], layout);
                currentIndex = 0;
                animatePlot();
            }
        });
        });
    });
    }
    

        function generatePoints(params) {
            let x = 0, y = 0;
            for (let i = 0; i < numberOfPoints; i++) {
                let point = cliffordAttractor(params.a, params.b, params.c, params.d, x, y);
                data.x[i] = point.x;
                data.y[i] = point.y;
                x = point.x;
                y = point.y;
            }
        }

        // Animation function
        let currentIndex = 0;
        function animatePlot() {
            if (!isPaused && currentIndex < numberOfPoints) {
                const progressRatio = currentIndex / numberOfPoints;
                const batchSize = Math.floor(minBatchSize + progressRatio * (maxBatchSize - minBatchSize));                
                let pointsToAdd = Math.min(batchSize, numberOfPoints - currentIndex);
                let update = {
                    x: [Array.from(data.x.slice(currentIndex, currentIndex + pointsToAdd))],
                    y: [Array.from(data.y.slice(currentIndex, currentIndex + pointsToAdd))]
                };

                Plotly.extendTraces('attractor-plot', update, [0]);
                currentIndex += pointsToAdd;
                animationTimeout = setTimeout(animatePlot, timeoutInterval);
            } else if (currentIndex >= numberOfPoints) {
                params = alterParameters(initParams.a, initParams.b, initParams.c, initParams.d);
                startAnimation(params);
            }
        }

        function updatePlotSize() {
            document.getElementById('attractor-plot').style.width = plotWidth + 'px';
            document.getElementById('attractor-plot').style.height = plotHeight + 'px';
            Plotly.relayout('attractor-plot', { width: plotWidth, height: plotHeight });
        }
        function flashScreen(callback) {
            // Step 1: Create the black overlay
            const blackOverlay = document.createElement('div');
    
            // Step 2: Style the overlay to cover the whole screen
            blackOverlay.style.position = 'fixed';
            blackOverlay.style.top = 0;
            blackOverlay.style.left = 0;
            blackOverlay.style.width = '100%';
            blackOverlay.style.height = '100%';
            blackOverlay.style.backgroundColor = 'black';
            blackOverlay.style.zIndex = 9999;  // Ensure it's on top of everything
            blackOverlay.style.pointerEvents = 'none';  // Don't block user interaction

            // Step 3: Append the overlay to the body
            document.body.appendChild(blackOverlay);

            // Step 4: Wait for a short time, then remove the overlay
            setTimeout(() => {
                // Remove the black overlay from the DOM
                document.body.removeChild(blackOverlay);
                // Call the callback function after the flash effect is complete
                if (typeof callback === 'function') {
                    callback();
                }
            }, 500);  // 200ms flash duration
        }
        function flashScreen2(callback) {
            const bodyElement = document.body;
            const plotElement = document.getElementById('attractor-plot');
            const flashCount = 3;  // Number of times to flash
            const flashInterval = 500;  // Time in milliseconds between flashes

            for (let i = 0; i < flashCount * 2; i++) {
                setTimeout(() => {
                    const isBlack = i % 2 === 0; // Alternate between black and white
                    bodyElement.style.backgroundColor = isBlack ? 'black' : 'white';
                    plotElement.style.backgroundColor = isBlack ? 'black' : 'white';
                }, i * flashInterval);
            }
            setTimeout(() => {// Restore original background color after flashing
                bodyElement.style.backgroundColor = '';  // Restore to default
                plotElement.style.backgroundColor = '';  // Restore to default
                if (typeof callback === 'function') {
                    callback(); // Call the callback function after flash is done
                }
            }, flashCount * 2 * flashInterval);
        }  

        // Toggle visibility of controls when hamburger icon is clicked
        document.getElementById('icon').addEventListener('click', function() {
            const controlsContainer = document.getElementById('controls-container');
            controlsContainer.style.display = controlsContainer.style.display === 'block' ? 'none' : 'block';
        });

        // Hide controls when clicking outside the controls container
        document.addEventListener('click', function(event) {
            const controlsContainer = document.getElementById('controls-container');
            const toggleButton = document.getElementById('icon');
            // Check if the click happened outside of the controls container and toggle button
            if (!controlsContainer.contains(event.target) && !toggleButton.contains(event.target)) {
                controlsContainer.style.display = 'none';  // Hide the controls container
            }
        });

        // Play/Pause Button Event
        document.getElementById('playPauseButton').addEventListener('click', function() {
            const controlsContainer = document.getElementById('controls-container');
            controlsContainer.style.display = controlsContainer.style.display === 'block' ? 'none' : 'block';
            isPaused = !isPaused;
            this.textContent = isPaused ? 'Play' : 'Pause';
            if (!isPaused) animatePlot(); // Restart animation if unpaused
        });

        // Next animation button event
        document.getElementById('nextButton').addEventListener('click', function() {
            const controlsContainer = document.getElementById('controls-container');
            controlsContainer.style.display = controlsContainer.style.display === 'block' ? 'none' : 'block';
            clearTimeout(animationTimeout);
            params = alterParameters(initParams.a, initParams.b, initParams.c, initParams.d);
            startAnimation(params);
        });

        // Update Timeout Interval
        document.getElementById('timeoutIntervalSlider').addEventListener('input', function() {
            timeoutInterval = parseInt(this.value);
            document.getElementById('timeoutIntervalValue').textContent = timeoutInterval;
        });

        // Update Min Batch Size
        document.getElementById('minBatchSizeSlider').addEventListener('input', function() {
            minBatchSize = parseInt(this.value);
            document.getElementById('minBatchSizeValue').textContent = minBatchSize;
        });

        // Update Max Batch Size
        document.getElementById('maxBatchSizeSlider').addEventListener('input', function() {
            maxBatchSize = parseInt(this.value);
            document.getElementById('maxBatchSizeValue').textContent = maxBatchSize;
        });        

        // Update Number of Points
        document.getElementById('numberOfPointsSlider').addEventListener('input', function() {
            numberOfPoints = parseInt(this.value);
            document.getElementById('numberOfPointsValue').textContent = numberOfPoints;
        });        

        // Update Plot Width
        document.getElementById('plotWidthSlider').addEventListener('input', function() {
            plotWidth = parseInt(this.value);
            document.getElementById('plotWidthValue').textContent = plotWidth;
            updatePlotSize();
        });

        // Update Plot Height
        document.getElementById('plotHeightSlider').addEventListener('input', function() {
            plotHeight = parseInt(this.value);
            document.getElementById('plotHeightValue').textContent = plotHeight;
            updatePlotSize();
        });

        // Start the first animation
        startAnimation(params);
        window.addEventListener('resize', function() {Plotly.Plots.resize('attractor-plot');});
    </script>
</body>
</html>
